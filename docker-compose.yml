version: '3.8'

services:
  rabbitmq-bootstrap:
    build: .
    image: czertainly/rabbitmq-bootstrap:latest
    container_name: czertainly-rabbitmq-bootstrap
    ports:
      - "8077:8077"
    environment:
      # Required: RabbitMQ connection details
      USERNAME: ${USERNAME:-guest}
      PASSWORD: ${PASSWORD:-guest}
      # Use host.docker.internal to connect to services on host machine (Mac/Windows)
      # Or use actual IP address of your RabbitMQ server
      RABBITMQ_URL: ${RABBITMQ_URL:-http://host.docker.internal:15672}

      # Optional: Override defaults
      VHOST: ${VHOST:-/}
      DEFINITIONS_FILE: ${DEFINITIONS_FILE:-definitions.json}
      PORT: ${PORT:-8077}
    # Uncomment for Linux to use host networking (allows localhost)
    # network_mode: "host"
    healthcheck:
      test: wget --no-verbose --tries=1 --spider http://localhost:8077/actuator/health || exit 1
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 40s