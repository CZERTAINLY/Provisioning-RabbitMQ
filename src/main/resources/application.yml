server:
  port: ${PORT:8077}

spring:
  application:
    name: rabbit-sub-config-poc
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:provisioner}
    password: ${RABBITMQ_PASSWORD:provisioner}
  docker:
    compose:
      lifecycle-management: start_and_stop
app:
  security:
    api-key: poc-secret-api-key
  token:
    # Must be at least 32 characters.
    signing-key: ${TOKEN_SIGNING_KEY:}
  proxy:
    # External AMQP URL that proxies use to connect (may differ from internal spring.rabbitmq.host).
    amqp-url: ${PROXY_AMQP_URL:amqp://localhost:5672}
    username: ${PROXY_RABBITMQ_USERNAME:${spring.rabbitmq.username}}
    password: ${PROXY_RABBITMQ_PASSWORD:${spring.rabbitmq.password}}
    exchange: ${PROXY_EXCHANGE:proxy.topic}

logging:
  level:
    com.czertainly.rabbitmq.bootstrap: DEBUG
    org.springframework.amqp: INFO
